services:
  vllm:
    image: vllm/vllm-openai:v0.10.2
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['0']
            capabilities: [gpu]

    environment:
      NVIDIA_VISIBLE_DEVICES: "0"

    volumes:
      - ./:/workspace
      - /home/user/model:/mnt/model

    ports:
      - "18299:8000"
    ipc: host

    command: >
      --model "/workspace/lab3_finetune/output_model/finetuned_model_2026-04-16-03-49-29/epoch_2_step_79_#Qwen2.5-3B-Instruct"
      --host 0.0.0.0
      --port 8000
      --served-model-name Qwen2.5-3B-Instruct
      --max-model-len 4096
      --kv-cache-dtype auto
      -tp 1
      --gpu-memory-utilization 0.6
