services:
  vllm_trained:
    image: vllm/vllm-openai:v0.18.0
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['0']
            capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./:/workspace
      - /home/user/model/Qwen3.5-2B:/llm/Qwen3.5-2B
      - /home/user/tsai/2026_ai_rookie_course8/lab4/grpo_output/final:/lora_final
    ports:
      - "18299:8000"
    ipc: host
    entrypoint: ["vllm", "serve"]
    command:
      - "/llm/Qwen3.5-2B"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--served-model-name"
      - "trained_base_model"
      - "--max-model-len"
      - "4096"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--enable-lora"
      - "--max-lora-rank"
      - "64"
      - "--lora-modules"
      - "customer_service_lora=/lora_final"
      - "--enforce-eager"